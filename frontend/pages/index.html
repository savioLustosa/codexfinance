<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Finance SaaS</title>
  </head>
  <body>
    <header class="topbar">
      <h1>Finance SaaS</h1>
      <button id="themeToggle">🌙</button>
    </header>

    <main class="container">
      <section id="authSection" class="card">
        <h2>Acesso</h2>
        <form id="registerForm" class="form-grid">
          <input name="name" placeholder="Nome" required />
          <input name="email" type="email" placeholder="E-mail" required />
          <input name="password" type="password" placeholder="Senha" required />
          <button>Cadastrar</button>
        </form>
        <form id="loginForm" class="form-grid">
          <input name="email" type="email" placeholder="E-mail" required />
          <input name="password" type="password" placeholder="Senha" required />
          <button>Login</button>
        </form>
        <form id="forgotForm" class="form-grid">
          <input name="email" type="email" placeholder="E-mail para recuperação" required />
          <button>Recuperar senha</button>
        </form>
      </section>

      <section id="appSection" class="hidden">
        <div class="actions card">
          <button id="logoutBtn">Logout</button>
          <button id="csvBtn">Exportar CSV</button>
          <button id="pdfBtn">Exportar PDF</button>
        </div>

        <div class="metrics">
          <article class="card"><h3>Saldo Total</h3><p id="totalBalance">R$ 0,00</p></article>
          <article class="card"><h3>Receitas Mês</h3><p id="monthlyIncome">R$ 0,00</p></article>
          <article class="card"><h3>Despesas Mês</h3><p id="monthlyExpense">R$ 0,00</p></article>
        </div>

        <section class="card">
          <h3>Nova Transação</h3>
          <form id="transactionForm" class="form-grid">
            <select name="type" required>
              <option value="income">Receita</option>
              <option value="expense">Despesa</option>
            </select>
            <input name="amount" type="number" step="0.01" min="0" placeholder="Valor" required />
            <input name="description" placeholder="Descrição" required />
            <select id="categorySelect" name="categoryId" required></select>
            <input name="transactionDate" type="date" required />
            <button>Salvar transação</button>
          </form>
        </section>

        <section class="card">
          <h3>Categorias</h3>
          <form id="categoryForm" class="inline">
            <input name="name" placeholder="Nova categoria" required />
            <button>Criar</button>
          </form>
        </section>

        <section class="card">
          <h3>Metas Financeiras</h3>
          <form id="goalForm" class="form-grid">
            <input name="name" placeholder="Nome da meta" required />
            <input name="targetAmount" type="number" step="0.01" min="1" placeholder="Meta (R$)" required />
            <input name="deadline" type="date" required />
            <button>Criar meta</button>
          </form>
          <div id="goalsList"></div>
        </section>

        <section class="grid-2">
          <article class="card"><canvas id="categoryChart"></canvas></article>
          <article class="card"><canvas id="monthlyChart"></canvas></article>
        </section>

        <section class="card">
          <h3>Transações</h3>
          <div id="transactionsList"></div>
        </section>
      </section>
    </main>

    <script src="/scripts/app.js"></script>
  </body>
</html>
